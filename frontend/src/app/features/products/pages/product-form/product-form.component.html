<div class="page">
  <div class="page-header">
    <h1>{{ isEditMode ? 'Edit Product' : 'New Product' }}</h1>
  </div>

  <section class="content-card">
    <form class="product-form" (ngSubmit)="save()">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="name" name="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>SKU</mat-label>
        <input matInput [(ngModel)]="sku" name="sku" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" [(ngModel)]="price" name="price" />
      </mat-form-field>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <div class="actions">
        <button mat-stroked-button type="button" (click)="cancel()" [disabled]="loading">
          Cancel
        </button>

        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          {{ loading ? 'Saving...' : (isEditMode ? 'Update' : 'Save') }}
        </button>
      </div>
    </form>
  </section>
</div>
